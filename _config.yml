title: Machine Learning
description: An index and topic collection covering machine learning APIs, MLOps platforms,
  model serving infrastructure, and inference providers. Machine learning APIs span
  the full ML lifecycle — from data labeling, experiment tracking, and model training
  to model registries, hosted inference, and vector search. This collection brings
  together hyperscaler ML platforms (Amazon SageMaker, Google Vertex AI, Azure Machine
  Learning), open-source MLOps frameworks (MLflow, Kubeflow, ZenML, DVC), GPU inference
  providers (Together AI, Fireworks AI, Replicate, Groq, Modal, Baseten), vector databases
  (Pinecone, Weaviate, Milvus, Qdrant, Chroma), and model hubs (Hugging Face) that
  together power production machine learning at scale.
url: https://machine-learning.apievangelist.com
collections:
  api_stories:
    output: false
exclude:
- README.md
- Gemfile
- Gemfile.lock
- Dockerfile
- examples
- json-ld
- json-schema
- json-structure
- vocabulary
